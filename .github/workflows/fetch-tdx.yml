name: 每日更新 TDX 全台活動資料

on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:
    inputs:
      debug:
        description: '啟用詳細 log（true/false）'
        required: false
        default: 'false'

jobs:
  fetch-and-commit:
    name: 抓取 TDX 資料並 commit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ensure data directory exists
        run: mkdir -p data

      - name: Fetch TDX events data
        env:
          TDX_CLIENT_ID:     ${{ secrets.TDX_CLIENT_ID }}
          TDX_CLIENT_SECRET: ${{ secrets.TDX_CLIENT_SECRET }}
          DEBUG:             ${{ github.event.inputs.debug || 'false' }}
        run: |
          echo "=== 開始執行 TDX 資料抓取 ==="
          echo "時間：$(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M:%S') (台灣時間)"
          node scripts/fetch_tdx.js
          if [ -f data/events.json ]; then
            echo "✅ events.json 產出成功"
          else
            echo "❌ data/events.json 不存在！"
            exit 1
          fi

      - name: Health check — validate events.json
        run: node scripts/health_check.js

      - name: Set commit time env
        run: echo "COMMIT_TIME=$(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M')" >> $GITHUB_ENV

      - name: Commit and push updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(data): 自動更新 TDX 全台活動資料"
          file_pattern: 'data/events.json'
          commit_author: 'github-actions[bot] <github-actions[bot]@users.noreply.github.com>'
          skip_dirty_check: false
