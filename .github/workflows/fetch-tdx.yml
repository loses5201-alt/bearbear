# .github/workflows/fetch-tdx.yml
# ─────────────────────────────────────────────────────────────
# BearBear 全台活動資料自動更新工作流
#
# 執行時機：
#   - 每天台灣時間凌晨 03:00（UTC 19:00）自動執行
#   - 可在 GitHub Actions 頁面手動觸發（workflow_dispatch）
#
# 必要設定（GitHub Settings → Secrets and variables → Actions）：
#   TDX_CLIENT_ID      — TDX 平台的 Client ID
#   TDX_CLIENT_SECRET  — TDX 平台的 Client Secret
#
# TDX 申請免費帳號：https://tdx.transportdata.gov.tw/register
# ─────────────────────────────────────────────────────────────

name: 每日更新 TDX 全台活動資料

on:
  # 台灣時間凌晨 03:00 = UTC 19:00（前一天）
  schedule:
    - cron: '0 19 * * *'

  # 允許在 Actions 頁面手動觸發（方便測試）
  workflow_dispatch:
    inputs:
      debug:
        description: '啟用詳細 log（true/false）'
        required: false
        default: 'false'

jobs:
  fetch-and-commit:
    name: 抓取 TDX 資料並 commit
    runs-on: ubuntu-latest
    timeout-minutes: 15      # 超過 15 分鐘強制終止（防止意外扣點）

    permissions:
      contents: write         # 允許 git commit & push

    steps:
      # ── Step 1：Checkout ──────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # 用 GITHUB_TOKEN 讓後續 commit 有寫入權限
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Step 2：設定 Node.js ──────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # 無 package.json 的純腳本，不需要 cache

      # ── Step 3：確認 data/ 目錄存在 ──────────────────────
      - name: Ensure data directory exists
        run: mkdir -p data

      # ── Step 4：執行 TDX 抓取腳本 ────────────────────────
      - name: Fetch TDX events data
        env:
          TDX_CLIENT_ID:     ${{ secrets.TDX_CLIENT_ID }}
          TDX_CLIENT_SECRET: ${{ secrets.TDX_CLIENT_SECRET }}
          DEBUG:             ${{ github.event.inputs.debug || 'false' }}
        run: |
          echo "=== 開始執行 TDX 資料抓取 ==="
          echo "時間：$(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M:%S') (台灣時間)"
          node scripts/fetch_tdx.js
          echo ""
          echo "=== 資料檔案資訊 ==="
          if [ -f data/events.json ]; then
            echo "檔案大小：$(du -sh data/events.json | cut -f1)"
            echo "活動筆數：$(node -e "const d=require('./data/events.json'); console.log(d.count || d.events?.length || 0)") 筆"
            echo "更新時間：$(node -e "const d=require('./data/events.json'); console.log(d.updated_at || '未知')")"
          else
            echo "❌ data/events.json 不存在！"
            exit 1
          fi

      # ── Step 4b：健康度檢查（失敗則阻止 commit）──────────
      - name: Health check — validate events.json
        run: node scripts/health_check.js

      # ── Step 4c：LINE Notify 成功通知 ───────────────────
      - name: Send LINE Notify report
        if: success()
        env:
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
        run: node scripts/line_notify.js

      # ── Step 5：自動 Commit & Push ────────────────────────
      - name: Commit and push updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: |
            chore(data): 自動更新 TDX 全台活動資料

            更新時間：${{ env.COMMIT_TIME }}
            資料來源：TDX 交通部觀光 API
          file_pattern: 'data/events.json'
          commit_author: 'github-actions[bot] <github-actions[bot]@users.noreply.github.com>'
          # 若資料沒有變動（API 回同樣內容），跳過 commit
          skip_dirty_check: false

      # ── Step 6：設定環境變數（供 commit message 使用）────
      - name: Set commit time env
        run: echo "COMMIT_TIME=$(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M')" >> $GITHUB_ENV

      # ── Step 7：失敗通知（可選）──────────────────────────
      # 若要 Email 通知失敗，在 GitHub 個人設定中開啟
      # Settings → Notifications → GitHub Actions → 勾選 Failed workflows only

      # ── Step 8：失敗時 LINE 警報 ────────────────────────
      - name: Send LINE Notify — failure alert
        if: failure()
        env:
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
        run: |
          node -e "
          const https=require('https');
          const msg=encodeURIComponent('\n🚨 BearBear 警報：今日資料更新失敗！\n請至 GitHub Actions 查看錯誤原因。');
          const b='message='+msg;
          const r=https.request({hostname:'notify-api.line.me',path:'/api/notify',method:'POST',headers:{'Authorization':'Bearer '+process.env.LINE_NOTIFY_TOKEN,'Content-Type':'application/x-www-form-urlencoded','Content-Length':Buffer.byteLength(b)}},res=>console.log('LINE status:',res.statusCode));
          r.write(b);r.end();"
